name: Direct VPS Deployment

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Navigate to your project folder
            cd Her-Collective
            
            # 2. Pull the latest code straight from GitHub
            git pull origin main
            
            # 3. Build the fresh Docker image locally on the server
            docker build -t hercollective-store .
            
            # 4. Stop and remove the currently running container
            docker stop hercollective-app || true
            docker rm hercollective-app || true
            
            # 5. Start the new container on port 5000
            docker run -d -p 5000:80 --name hercollective-app hercollective-store
            
            # 6. Clean up old leftover images to keep the server fast
            docker image prune -f